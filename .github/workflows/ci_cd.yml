name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend ./frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-service ./ai_service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ollama ./ollama
          docker build -t ${{ secrets.DOCKER_USERNAME }}/worker ./worker

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-service
          docker push ${{ secrets.DOCKER_USERNAME }}/ollama
          docker push ${{ secrets.DOCKER_USERNAME }}/worker
